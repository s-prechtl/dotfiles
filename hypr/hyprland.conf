#Variables

$Browser=brave # Your browser preference
$Files=nautilus  # Your File manager preference
$Term=alacritty # Your Term preference
$transform=0

#Monitor

monitor=eDP-1,1920x1080,1920x0, 1, transform, $transform
monitor=DP-1,highres,0x0,1,bitdepth,10
#monitor=eDP-1,disabled # uncomment if you want to enable built in screen again
#monitor=DP-1,prefered,1920x0,1,bitdepth,10
#monitor=,preferred,auto,1 # I recommend you look hyprctl monitors

#Window space reservation

monitor=eDP-1,addreserved,0,0,0,0
monitor=eDP-2,addreserved,0,0,0,0
monitor=DP-1,addreserved,0,0,0,0
monitor=HDMI-A-1,addreserved,55,0,0,0

#Mouse and Keyboard

input {
    kb_layout=us
    follow_mouse=1

    touchpad {
        natural_scroll=yes
    }

    sensitivity=0.0 # -1.0 - 1.0, 0 means no modification.

    touchdevice {
        transform=$transform
    }
}

#Decoration

general {
    gaps_in=10
    gaps_out=20

    border_size=2
    col.active_border=0xffebdbb2
    col.inactive_border=0xffD8DEE9
    apply_sens_to_raw=0 # whether to apply the sensitivity to raw input (e.g. used by games where you aim using your mouse)

}

decoration {
    active_opacity=0.9
    inactive_opacity=0.9
    rounding=10
    blur=1
    blur_size=3 # minimum 1
    blur_passes=1 # minimum 1
    blur_new_optimizations=true
}

animations {
    enabled=1
    bezier=overshot,0.13,0.99,0.29,1.1
    animation=windows,1,4,overshot,slide
    animation=border,1,10,default
    animation=fade,1,10,default
    animation=workspaces,1,6,overshot,slide
}

gestures {
    workspace_swipe=yes
    workspace_swipe_cancel_ratio = 0.15
    workspace_swipe_fingers=4
}

dwindle {
    pseudotile=1 # enable pseudotiling on dwindle
    force_split=0
}

misc {
    vfr=true
}

# Window Rules

windowrule = fullscreen, wlogout
windowrule = float, title:wlogout
windowrule = fullscreen, title:wlogout
windowrule = move 300 300, float, title:^(jetbrains toolbox)$,
windowrule=float,wofi
windowrule=fullscreen,title:^(full)$

# some nice mouse binds
bindm=SUPER,mouse:272,movewindow
bindm=SUPER,mouse:273,resizewindow

# Custom Binds

bind=SUPERSHIFT,U,hyprload,update
bind=SUPER,RETURN,exec,$Term # Normal
bind=SUPER,B,exec,$Browser
bind=SUPER,E,exec,$Files
bind=SUPER,D,exec,wofi --show drun
bind=SUPER,Q,killactive,
bind=SUPERSHIFT,E,exec,pkill Hyprland
bind=SUPERSHIFT,R,exec,hyprctl reload
bind=SUPER,space,togglefloating,
bind=SUPER,P, exec, wlogout
bind=ALTSHIFT, L, exec, swaylock --screenshots --clock --indicator --indicator-radius 100 --indicator-thickness 7 --effect-blur 7x5 --effect-vignette 0.5:0.5 --ring-color cc241d --key-hl-color fb4934 --line-color e1dbcd --inside-color fb4934cc --separator-color 00000000 --grace 2 --fade-in 0.2
bind=SUPER,F,fullscreen
bind=ALTSHIFT,A,exec,amixer set 'Master' 5%+
bind=ALTSHIFT,D,exec,amixer set 'Master' 5%-
bind=SUPERSHIFT,N,exec, swaync-client -t -sw

bind=SUPERSHIFT,P,exec,grim ~/Screenshots/$(date +'%Y%m%d%H%M%S_1.png') && notify-send 'Screenshot Saved'
bind=SUPERALTSHIFT, P, exec, scrot -s ~/Screenshots/$(date +'%Y%m%d%H%M%S_1.png') && notify-send 'Screenshot Saved'

#Brightness
bind=SUPERSHIFT,J,exec,brightnessctl --device=intel_backlight s 5%-
bind=SUPERSHIFT,K,exec,brightnessctl --device=intel_backlight s 5%+

# TWM Binds

bind=SUPER,left,movefocus,l
bind=SUPER, H,movefocus,l

bind=SUPER,right,movefocus,r
bind=SUPER, L,movefocus,r

bind=SUPER,up,movefocus,u
bind=SUPER, K,movefocus,u

bind=SUPER,down,movefocus,d
bind=SUPER, J,movefocus,d

# Workspaces Navigator

bind=SUPER,1,workspace,1
bind=SUPER,2,workspace,2
bind=SUPER,3,workspace,3
bind=SUPER,4,workspace,4
bind=SUPER,5,workspace,5
bind=SUPER,6,workspace,6
bind=SUPER,7,workspace,7
bind=SUPER,8,workspace,8
bind=SUPER,9,workspace,9
bind=SUPER,0,workspace,10


# Silent Workspaces

bind=ALTSHIFT,1,movetoworkspacesilent,1
bind=ALTSHIFT,2,movetoworkspacesilent,2
bind=ALTSHIFT,3,movetoworkspacesilent,3
bind=ALTSHIFT,4,movetoworkspacesilent,4
bind=ALTSHIFT,5,movetoworkspacesilent,5
bind=ALTSHIFT,6,movetoworkspacesilent,6
bind=ALTSHIFT,7,movetoworkspacesilent,7
bind=ALTSHIFT,8,movetoworkspacesilent,8
bind=ALTSHIFT,9,movetoworkspacesilent,9
bind=ALTSHIFT,0,movetoworkspacesilent,10

# Normal Workspaces

bind=SUPERSHIFT,1,movetoworkspace,1
bind=SUPERSHIFT,2,movetoworkspace,2
bind=SUPERSHIFT,3,movetoworkspace,3
bind=SUPERSHIFT,4,movetoworkspace,4
bind=SUPERSHIFT,5,movetoworkspace,5
bind=SUPERSHIFT,6,movetoworkspace,6
bind=SUPERSHIFT,7,movetoworkspace,7
bind=SUPERSHIFT,8,movetoworkspace,8
bind=SUPERSHIFT,9,movetoworkspace,9
bind=SUPERSHIFT,0,movetoworkspace,10

bind=SUPER,mouse_down,workspace,e+1
bind=SUPER,mouse_up,workspace,e-1

bind=SUPER,g,togglegroup
bind=SUPER,tab,changegroupactive


exec-once=waybar
exec-once=nextcloud --background
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=/usr/lib/polkit-kde-authentication-agent-1
exec-once=$HOME/.local/share/hyprload/hyprload.sh
source=~/.config/hypr/garden/garden.conf
